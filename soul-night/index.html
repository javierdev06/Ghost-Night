<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ghost Night</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="container">
    <canvas id="c" width="680" height="480"></canvas>

    <div id="menu">
      <h1>GHOST NIGHT</h1>
      <p>Un roguelike de mazmorras</p>
      <button onclick="startGame()">JUGAR</button>
      <button onclick="showLevelMap()" style="background:transparent; color:#7F77DD; border:1px solid #534AB7; padding:10px 32px; font-size:14px; font-family:monospace; border-radius:6px; cursor:pointer;">NIVELES</button>
      <button onclick="resetProgress()" style="background:transparent; color:#555; border:1px solid #333; padding:6px 20px; font-size:11px; font-family:monospace; border-radius:4px; cursor:pointer; margin-top:8px;">Borrar progreso</button>
    </div>

    <div id="charSelect">
      <h2>ELIGE TU HEROE</h2>
      <div class="char-grid" id="charGrid"></div>
      <button onclick="confirmChar()">ELEGIR</button>
    </div>

    <div id="levelMap">
      <h2>MAPA DE NIVELES</h2>
      <div class="level-grid" id="levelGrid"></div>
      <button class="back-btn" onclick="showMenu()">Volver</button>
    </div>

    <div id="levelComplete">
      <h2 id="levelCompleteTitle">NIVEL COMPLETADO</h2>
      <p id="levelCompleteMsg"></p>
      <button onclick="continueGame()">SIGUIENTE NIVEL</button>
    </div>

    <div id="pauseMenu">
      <h2>PAUSA</h2>
      <button onclick="resumeGame()">CONTINUAR</button>
      <button class="back-btn" onclick="quitToMenu()">MENU PRINCIPAL</button>
    </div>

    <div id="skinSelect">
      <h2>ELIGE TU SKIN</h2>
      <div class="skin-grid" id="skinGrid"></div>
      <button onclick="confirmSkin()">ELEGIR</button>
    </div>

  </div>
  <script src="js/game.js"></script>
</body>
</html>
